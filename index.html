<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- `maximum-scale=1` + `user-scalable=no` disable pinch / double-tap
         zoom. iOS Safari ignores this in a browser tab (by design, for
         accessibility) but honours it in the installed standalone PWA, where
         a stray pinch otherwise zooms the fixed shell larger than the screen
         — the page then pans sideways with a horizontal scrollbar and the
         text reflows mid-gesture. The app exposes its own text-size control
         (Settings → Appearance, the `--app-font-scale` token) so zoom isn't
         the only way to enlarge the UI. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#1f2933" />
    <meta
      name="description"
      content="A local-first PWA checklist app with template support and optional Google Drive / Dropbox sync."
    />
    <meta name="application-name" content="checklist" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />

    <!-- PWA: vite-plugin-pwa injects <link rel="manifest"> here at
         build time. The Apple-specific tags below are static. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="checklist" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <title>checklist</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
