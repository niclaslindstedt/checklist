<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- `maximum-scale=1` + `user-scalable=no` disable pinch / double-tap
         zoom. iOS Safari ignores this in a browser tab (by design, for
         accessibility) but honours it in the installed standalone PWA, where
         a stray pinch otherwise zooms the fixed shell larger than the screen
         — the page then pans sideways with a horizontal scrollbar and the
         text reflows mid-gesture. The app exposes its own text-size control
         (Settings → Appearance, the `--app-font-scale` token) so zoom isn't
         the only way to enlarge the UI. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark light" />
    <!-- Per OSS_SPEC §11.3.2: theme-color matched to each rendered
         background. Dark is the default shell; light is the light-theme bg. -->
    <meta
      name="theme-color"
      content="#1f2933"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#fafafa"
      media="(prefers-color-scheme: light)"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="author" content="Niclas Lindstedt" />
    <meta name="application-name" content="checklist" />
    <!-- Route-invariant social tags; the per-route og/twitter values live in
         the HEAD_SEO block below. -->
    <meta property="og:site_name" content="checklist" />
    <meta property="og:locale" content="en" />

    <link
      rel="sitemap"
      type="application/xml"
      href="https://checklist.niclaslindstedt.se/sitemap.xml"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />

    <!-- PWA: vite-plugin-pwa injects <link rel="manifest"> here at
         build time. The Apple-specific tags below are static. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="checklist" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- HEAD_SEO_START
         The per-route SEO payload (<title>, description, canonical, robots,
         OG/Twitter cards, JSON-LD) is injected here at build time from
         `src/seo/routes.ts` — `HOME_ROUTE` for `dist/index.html`, and the
         `emit-privacy-alias` plugin re-splices `PRIVACY_ROUTE` into
         `dist/privacy/index.html`. Keep these markers verbatim or the
         injector in `vite.config.ts` can't find the block to fill.
    -->
    <!-- HEAD_SEO_END -->
  </head>
  <body>
    <div id="app">
      <noscript>
        <!-- NOSCRIPT_START
             Pre-hydration fallback for clients that don't run the SPA bundle
             (crawlers, link unfurlers, no-JS readers). The build injects the
             route's body from `src/seo/routes.ts` between these markers;
             `main.tsx`'s createRoot() replaces #app the moment the bundle
             runs, so normal visitors never see it. Keep the markers verbatim.
        -->
        <!-- NOSCRIPT_END -->
      </noscript>
    </div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
