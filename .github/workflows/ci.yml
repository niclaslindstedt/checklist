name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Include `labeled` / `unlabeled` so the `no-changelog` escape
    # hatch re-runs the changeset job when the label is toggled after
    # the PR opened. Default `pull_request` activity types
    # (`opened`, `synchronize`, `reopened`) would otherwise leave the
    # check stuck red until the next push.
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  test:
    runs-on: ubuntu-latest
    # `packages: read` lets `npm ci` pull @niclaslindstedt/oss-framework from
    # the GitHub Packages npm registry; the committed `.npmrc` expands
    # `${GITHUB_TOKEN}` from the env set on the install step below.
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run build
      - run: npm test
      - run: npm run lint
      # Fail if public/favicon.svg was edited without rerunning
      # `make icons` and committing the regenerated PNG/ICO set.
      - run: make icons-check


  # Lint workflow YAML with actionlint and shell scripts with
  # shellcheck (OSS_SPEC §16.1). shellcheck is preinstalled on
  # ubuntu-latest; actionlint is fetched via its official installer.
  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "${PWD}" >> "$GITHUB_PATH"
      - name: make actionlint
        run: make actionlint
      - name: make shellcheck
        run: make shellcheck

  changeset:
    # Enforces that every PR touching user-visible code drops a
    # changelog fragment under .changes/unreleased/, or opts out via
    # the `no-changelog` label. Pure refactors, CI/build tweaks, and
    # docs-only edits pass via the skip-list inside the script.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Check for changelog fragment
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: node scripts/release/check-changeset.mjs
